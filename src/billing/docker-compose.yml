version: "3.9"
services:
  billing:
    build: .
    container_name: billing_service
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app   # Mount local app folder into container for live edits
    command: uvicorn billing:app --host 0.0.0.0 --port 8000 --reload
