
services:
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: weight
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db_schemas/weightdb.sql:/docker-entrypoint-initdb.d/weightdb.sql:ro

  weight-app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: weight
      FLASK_APP: app/weight.py
      FLASK_RUN_HOST: 0.0.0.0

volumes:
  db_data:
