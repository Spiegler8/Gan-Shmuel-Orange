services:
  mysql:
    image: mysql:8.0
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mySqlInit:/docker-entrypoint-initdb.d
    restart: always

  flask-app:
    build: .
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    restart: always

volumes:
  mysql_data:
